[tox]
envlist = py310, py311, py312, py313, py314, pylama

[testenv]
usedevelop = true
passenv = GITHUB_*, CI
deps = -rrequirements/tests.txt
commands =
    pytest --verbose --cov {posargs} --cov-report=xml
    codecov

[testenv:pylama]
deps = pylama
commands =
    pylama mozdownload

[pytest]
testpaths = tests
